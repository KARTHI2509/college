<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Apex University</title>
    
    <meta name="description" content="Oops! The page you are looking for does not exist on the Apex University site. Return to the home page or contact the help desk.">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Page Loader -->
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- 404 Error Center Content -->
    <div class="error-page-container reveal-zoom">
        <div class="error-code">404</div>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-description">Oops! The academic record or campus resource page you are looking for has been moved, renamed, or is temporarily offline.</p>
        <a href="index.html" class="btn btn-primary">Return to Home Page</a>
    </div>

    <!-- JS Imports -->
    <script src="js/theme.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/search.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
