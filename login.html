<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login | Apex University</title>
    
    <meta name="description" content="Access the Apex University student portal. Sign in to view grades, schedules, fee bills, and campus announcements.">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Page Loader -->
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Glassmorphic Login Center Panel -->
    <div class="auth-wrapper">
        <div class="hero-circle-1" style="top: 15%; left: 15%"></div>
        <div class="hero-circle-2" style="bottom: 15%; right: 15%"></div>
        
        <div class="auth-container glass reveal-zoom">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/><path d="M4.15 12.23L12 16.5l7.85-4.27v3.23L12 19.75l-7.85-4.29v-3.23z"/></svg>
                    <span>Apex Portal</span>
                </a>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to check grades, schedules, and fee invoices.</p>
            </div>

            <form data-validate>
                <div class="form-group">
                    <label class="form-label" for="login-email">Student Email</label>
                    <input type="email" id="login-email" required class="form-control" placeholder="username@apex.edu">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" required class="form-control" placeholder="••••••••">
                        <button class="password-toggle" type="button" aria-label="Toggle password visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <div class="auth-helper">
                    <label class="auth-checkbox-label">
                        <input type="checkbox" style="accent-color: var(--color-accent)"> Remember Me
                    </label>
                    <a href="#" style="color: var(--color-accent); font-weight: 600">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px">Sign In to Portal</button>
            </form>

            <div style="text-align: center; font-size: 0.9rem; color: var(--text-secondary)">
                New student? <a href="register.html" style="color: var(--color-accent); font-weight: 700">Register Portal Account</a>
            </div>
        </div>
    </div>

    <!-- JS Imports -->
    <script src="js/theme.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/search.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
