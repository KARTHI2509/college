<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Register | Apex University</title>
    
    <meta name="description" content="Register your Apex University student portal account. Secure your profile for syllabus catalogs and placements registration.">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Page Loader -->
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Registration Panel -->
    <div class="auth-wrapper">
        <div class="hero-circle-1" style="top: 10%; left: 10%"></div>
        <div class="hero-circle-2" style="bottom: 10%; right: 10%"></div>
        
        <div class="auth-container glass reveal-zoom" style="max-width: 520px; padding: 40px">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/><path d="M4.15 12.23L12 16.5l7.85-4.27v3.23L12 19.75l-7.85-4.29v-3.23z"/></svg>
                    <span>Apex Portal</span>
                </a>
                <h2 class="auth-title">Register Account</h2>
                <p class="auth-subtitle">Verify your student roll number and setup security credentials.</p>
            </div>

            <form data-validate>
                <div class="form-group">
                    <label class="form-label" for="register-name">Student Full Name</label>
                    <input type="text" id="register-name" required class="form-control" placeholder="Jane Doe">
                </div>

                <div class="form-group">
                    <label class="form-label" for="register-roll">Roll Number / App ID</label>
                    <input type="text" id="register-roll" required class="form-control" placeholder="e.g. APX-2026-105">
                </div>

                <div class="form-group">
                    <label class="form-label" for="register-email">Student Email Address</label>
                    <input type="email" id="register-email" required class="form-control" placeholder="jane@apex.edu">
                </div>

                <div class="form-group">
                    <label class="form-label" for="register-password">Create Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="register-password" required class="form-control" placeholder="••••••••">
                        <button class="password-toggle" type="button" aria-label="Toggle password visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <!-- Strength meter bar -->
                    <div class="password-strength-bar">
                        <div class="password-strength-fill"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm-password" required class="form-control" placeholder="••••••••">
                    </div>
                </div>

                <div class="auth-helper" style="justify-content: flex-start; gap: 8px">
                    <input type="checkbox" required style="accent-color: var(--color-accent)">
                    <span>I accept the <a href="#" style="color:var(--color-accent); font-weight:600">Portal terms & policy</a></span>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-bottom: 20px">Register Profile</button>
            </form>

            <div style="text-align: center; font-size: 0.9rem; color: var(--text-secondary)">
                Already registered? <a href="login.html" style="color: var(--color-accent); font-weight: 700">Sign In instead</a>
            </div>
        </div>
    </div>

    <!-- JS Imports -->
    <script src="js/theme.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/search.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
